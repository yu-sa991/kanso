name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🛠️【超重要！ここを追加！】GitHubのロボットの中に、Docker Composeのコマンド本体を完璧にインストールする魔法の部品
      - name: Set up Docker Compose
        uses: KengoTogo/setup-docker-compose@v1

      # 🚀 これで docker-compose コマンドが100%確実に使えるようになります！
      - name: Build and Start Containers
        run: |
          docker-compose build
          docker-compose up -d backend
          
      - name: Install Gems
        run: |
          docker-compose exec -T backend bundle install

      - name: Run RuboCop
        run: |
          docker-compose exec -T backend bundle exec rubocop

      - name: Run RSpec
        run: |
          docker-compose exec -T backend bundle exec rspec

      - name: Stop Containers
        if: always()
        run: docker-compose down
