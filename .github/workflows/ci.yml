name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🚀 GitHub公式の標準コマンド（スペース空け）を使って組み立てます！
      - name: Build and Start Containers
        run: |
          docker compose build
          docker compose up -d backend
          
      # ✨ 立ち上がったコンテナの中で、必要なソフト（RuboCop等）を最初に自動インストールさせます！
      - name: Install Gems
        run: |
          docker compose exec -T backend bundle install

      # 3.  静的解析：RuboCop（コードの書き方の乱れ）を自動チェックさせる
      - name: Run RuboCop
        run: |
          docker compose exec -T backend bundle exec rubocop

      # 4.  自動テスト：RSpec（プログラムが正しく動くか）を自動実行させる
      - name: Run RSpec
        run: |
          docker compose exec -T backend bundle exec rspec

      # 5. 後片付け：終わったら Docker の箱を綺麗に閉じる
      - name: Stop Containers
        if: always()
        run: docker compose down
