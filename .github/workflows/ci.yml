name: Continuous Integration

#  トリガー：mainブランチや各種ブランチに push またはプルリクが送られたら自動起動
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 【バックエンドの自動チェック】
  backend-ci:
    runs-on: ubuntu-latest
    
    steps:
      # 1. GitHubのロボットにあなたのコードをダウンロードさせる
      - name: Checkout code
        uses: actions/checkout@v4

      # 🤖 GitHubの工場の中で、Dockerコマンドを100%確実に使えるようにする魔法の部品
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✨ ハイフン繋ぎの docker-compose コマンドに修正して、迷子バグを完全粉砕します！
      - name: Build and Start Containers
        run: |
          docker-compose build
          docker-compose up -d backend
          
      # 🛠️【超重要！】コンテナの中で、RuboCopやRSpecに必要なソフトをすべてインストールさせる魔法の命令
      - name: Install Gems
        run: |
          docker-compose exec -T backend bundle install

      # 3.  静的解析：RuboCop（コードの書き方の乱れ）を自動チェックさせる
      - name: Run RuboCop
        run: |
          docker-compose exec -T backend bundle exec rubocop

      # 4.  自動テスト：RSpec（プログラムが正しく動くか）を自動実行させる
      - name: Run RSpec
        run: |
          docker-compose exec -T backend bundle exec rspec

      # 5. 後片付け：終わったら Docker の箱を綺麗に閉じる
      - name: Stop Containers
        if: always()
        run: docker-compose down
