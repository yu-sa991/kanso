name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🚀 Dockerの組み立て段階で bundle install が走るため、一撃で完璧にソフトが揃います！
      - name: Build and Start Containers
        run: |
          docker compose build
          docker compose up -d backend

      # 3. 静的解析：RuboCop（コマンドを見失わないよう、コンテナ内の絶対パス /usr/local/bundle/bin/bundle で実行します！）
      - name: Run RuboCop
        run: |
          docker compose exec -T backend /usr/local/bundle/bin/bundle exec rubocop

      # 4. 自動テスト：RSpec（こちらも絶対パスで確実に実行させます！）
      - name: Run RSpec
        run: |
          docker compose exec -T backend /usr/local/bundle/bin/bundle exec rspec

      # 5. 後片付け：終わったら Docker の箱を綺麗に閉じる
      - name: Stop Containers
        if: always()
        run: docker compose down
